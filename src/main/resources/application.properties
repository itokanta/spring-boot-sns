spring.application.name=spring-boot-sns

# ===========================================
# データベース設定 (Rails の database.yml に相当)
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/sns_db
spring.datasource.username=sns_user
spring.datasource.password=sns_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================================
# JPA/Hibernate設定 (Rails の ActiveRecord に相当)
# ===========================================
# create-drop: アプリ起動時にテーブル作成、終了時に削除 (開発用)
# Rails の rake db:migrate + rake db:drop に相当
spring.jpa.hibernate.ddl-auto=create-drop

# SQLログ出力 (Rails の config.log_level = :debug に相当)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL用の方言設定
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================================
# サーバー設定 (Rails の puma や unicorn に相当)
# ===========================================
server.port=8080

# ===========================================
# Thymeleaf設定 (Rails の ERB に相当)
# ===========================================
# 開発時はキャッシュ無効化 (Rails の config.cache_classes = false に相当)
spring.thymeleaf.cache=false
